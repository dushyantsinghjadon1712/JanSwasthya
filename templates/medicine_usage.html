{% extends "base.html" %}
{% block content %}

<h2 class="text-2xl text-indigo-400 mb-6">
Top Used Medicines
</h2>

<table class="glass w-full text-center">

<tr class="bg-indigo-600/30">
<th>Medicine</th>
<th>Total Used</th>
</tr>

{% for m in medicines %}

<tr>
<td>{{ m.generic_name }}</td>
<td>{{ m.total_used }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
